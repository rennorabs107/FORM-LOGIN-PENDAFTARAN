<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM LOGIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .full-page-gradient{
            height: 100vh;
            background: linear-gradient(135deg, #13d60dbb 0%, #c1ffa8);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-primary{
            background-color: #7f9132;
            border: none;
        }
        .btn-primary:hover{
            background-color: #1c8807;
        }
    </style>
</head>
<body class="full-page-gradient">
    <script>
        window.onload = function(){
            window.alert("Selamat datang di halaman login!");
            }
            </script>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card p-4">
                    <div class="card-body">
                        <h4 class="text-center" mb-4>Form Login</h4>
                        <form id="loginForm">

    <div class="mb-3">
        <input type="text" id="loginUsername" class="form-control" placeholder="Username">
    </div>

    <div class="mb-3">
        <input type="password" id="loginPassword" class="form-control" placeholder="Password">
    </div>

    <button type="submit" class="btn btn-primary w-100">
        LOGIN
    </button>

</form>
                                    <button type="reset" class="btn btn-outline-secondary w-100 mt-2">RESET</button>
                                    <div class="text-center mt-3">
                                <small>Belum punya akun? <a href="daftar.html">Daftar di sini</a></small>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</div>
<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let username = document.getElementById("loginUsername").value;
    let password = document.getElementById("loginPassword").value;

    // ambil data dari localStorage
    let user = JSON.parse(localStorage.getItem("user"));

    // cek data
    if(user && username === user.username && password === user.password){
        alert("Login berhasil!");
    } else {
        alert("Username atau password salah!");
    }
});
</script>
</body>
</html>
